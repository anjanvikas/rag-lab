<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ArXiv AI Research Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/dist/bundle.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar: Search + Papers + Ingestion Status -->
    <div id="search-root" class="sidebar"></div>

    <!-- Main: Research Chat Assistant -->
    <div id="chat-root" class="chat-panel"></div>

    <!-- Viz: Knowledge Graph / Pipeline Traces (Hidden by default) -->
    <div id="viz-root" className="viz-drawer hidden"></div>
  </div>

  <!-- Shared Modals for Auth / Settings -->
  <div id="modal-root"></div>

  <!-- Global Vite Bundle -->
  <script type="module" src="/static/dist/bundle.js"></script>
</body>
</html>
