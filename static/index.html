<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ArXiv AI Research Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    :root{--bg:#050810;--bg2:#090d1a;--surface:rgba(255,255,255,.04);--surface-hover:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);--border-bright:rgba(99,179,237,.4);--accent:#63b3ed;--accent2:#9f7aea;--accent-glow:rgba(99,179,237,.15);--text:#e8edf5;--td:#8892a4;--tdm:#4a5568;--success:#68d391;--error:#fc8181;--warn:#f6ad55;--user-bubble:rgba(99,179,237,.12);--ai-bubble:rgba(159,122,234,.08);--radius:14px;--sidebar-w:320px}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;overflow:hidden}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
    .layout{display:flex;height:100vh;background:radial-gradient(ellipse at 20% 50%,rgba(99,179,237,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(159,122,234,.05) 0%,transparent 50%)}
    .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .brand-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
    .brand-sub{font-size:11px;color:var(--td);margin-top:1px}
    .pipeline-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .pill{font-size:10px;font-weight:600;letter-spacing:.3px;padding:3px 8px;border-radius:20px;border:1px solid;display:flex;align-items:center;gap:4px}
    .pill.on{background:rgba(104,211,145,.1);color:var(--success);border-color:rgba(104,211,145,.25)}
    .pill.off{background:rgba(255,255,255,.03);color:var(--tdm);border-color:var(--border)}
    .search-box{position:relative}
    .search-box input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 36px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
    .search-box input:focus{border-color:var(--accent)}
    .search-box input::placeholder{color:var(--tdm)}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tdm);font-size:14px}
    .sidebar-count{padding:12px 20px 8px;font-size:11px;color:var(--td);font-weight:500;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
    .count-badge{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(99,179,237,.25);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600}
    .papers-list{flex:1;overflow-y:auto;padding:0 12px 12px}
    .papers-list::-webkit-scrollbar{width:4px}
    .papers-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .paper-item{padding:10px 12px;border-radius:10px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s ease;position:relative}
    .paper-item:hover{background:var(--surface-hover);border-color:var(--border)}
    .paper-item.selected{background:var(--accent-glow);border-color:var(--border-bright)}
    .paper-title{font-size:12.5px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .paper-meta{font-size:11px;color:var(--td);margin-top:4px;display:flex;gap:8px;align-items:center}
    .paper-year{background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;font-weight:500}
    .paper-category{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .check-mark{position:absolute;right:10px;top:10px;color:var(--accent);font-size:12px}
    .sidebar-footer{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0}
    .scope-indicator{font-size:11.5px;color:var(--td);display:flex;align-items:center;gap:6px}
    .scope-dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
    .scope-dot.all{background:var(--accent2)}
    .clear-btn{background:none;border:1px solid var(--border);color:var(--td);font-size:11px;cursor:pointer;border-radius:6px;padding:3px 8px;margin-left:auto;transition:all .15s;font-family:inherit}
    .clear-btn:hover{border-color:var(--error);color:var(--error)}
    .new-chat-btn{width:100%;margin-top:10px;background:var(--surface);border:1px solid var(--border);color:var(--td);font-size:12px;cursor:pointer;border-radius:8px;padding:7px 12px;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
    .new-chat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
    .chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .chat-header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;background:rgba(0,0,0,.2)}
    .chat-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .chat-title{font-size:16px;font-weight:600}
    .chat-sub{font-size:12px;color:var(--td);margin-top:2px}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .user-area{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 10px;border-radius:10px;border:1px solid var(--border);transition:all .15s;position:relative}
    .user-area:hover{background:var(--surface-hover)}
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
    .user-name{font-size:12px;color:var(--td);font-weight:500;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-key-dot{width:7px;height:7px;border-radius:50%;background:var(--error);flex-shrink:0}
    .user-key-dot.has-key{background:var(--success)}
    .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:190px;background:#0d1225;border:1px solid var(--border);border-radius:12px;padding:6px;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fadeIn .15s ease}
    .dropdown-item{padding:8px 12px;border-radius:8px;font-size:12.5px;color:var(--td);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s}
    .dropdown-item:hover{background:var(--surface-hover);color:var(--text)}
    .dropdown-item.danger:hover{background:rgba(252,129,129,.1);color:var(--error)}
    .dropdown-divider{height:1px;background:var(--border);margin:4px 2px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
    .modal-box{background:#0d1225;border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:100%;max-width:460px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
    .modal-title{font-size:20px;font-weight:700;margin-bottom:6px}
    .modal-sub{font-size:13px;color:var(--td);margin-bottom:24px;line-height:1.6}
    .modal-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:10px;transition:border-color .2s}
    .modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .modal-actions{display:flex;gap:10px;margin-top:6px}
    .modal-btn{flex:1;padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
    .modal-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .modal-btn.primary:hover{opacity:.9;transform:translateY(-1px)}
    .modal-btn.secondary{background:var(--surface);border:1px solid var(--border);color:var(--td)}
    .modal-btn.secondary:hover{border-color:var(--td);color:var(--text)}
    .modal-hint{font-size:11px;color:var(--tdm);margin-bottom:14px;line-height:1.5}
    .modal-hint a{color:var(--accent);text-decoration:none}
    .learn-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--td);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .15s}
    .learn-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
    .turn-badge{background:var(--surface);border:1px solid var(--border);color:var(--td);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
    .chat-messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px}
    .chat-messages::-webkit-scrollbar{width:4px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .message{display:flex;flex-direction:column;max-width:88%}
    .message.user{align-self:flex-end;align-items:flex-end}
    .message.assistant{align-self:flex-start;align-items:flex-start}
    .msg-label{font-size:11px;color:var(--tdm);margin-bottom:6px;font-weight:500}
    .bubble{padding:14px 18px;border-radius:var(--radius);font-size:14px;line-height:1.75;word-break:break-word}
    .message.user .bubble{background:var(--user-bubble);border:1px solid rgba(99,179,237,.2);border-bottom-right-radius:4px}
    .message.assistant .bubble{background:var(--ai-bubble);border:1px solid rgba(159,122,234,.15);border-bottom-left-radius:4px}
    .feedback-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-left:4px}
    .fb-btn{background:none;border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:2px 8px;font-size:14px;cursor:pointer;opacity:.4;transition:all .2s}
    .fb-btn:hover:not(:disabled){opacity:1;background:rgba(255,255,255,.05)}
    .fb-btn:disabled{cursor:default}
    .fb-active-up{opacity:1;border-color:#48bb78;background:rgba(72,187,120,.15)}
    .fb-active-down{opacity:1;border-color:#fc8181;background:rgba(252,129,129,.15)}
    .fb-thanks{font-size:11px;color:var(--tdm);font-style:italic;animation:fadeIn .3s ease}
    .md h1,.md h2,.md h3,.md h4{color:var(--text);font-weight:700;letter-spacing:-.3px;margin:18px 0 8px;line-height:1.3}
    .md h1{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:8px}
    .md h2{font-size:15px;color:var(--accent)}
    .md h3{font-size:13.5px;color:var(--accent2)}
    .md p{margin:8px 0;line-height:1.75}
    .md ul,.md ol{padding-left:20px;margin:8px 0}
    .md li{margin:4px 0;line-height:1.7}
    .md strong{color:var(--text);font-weight:600}
    .md code{font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);padding:2px 6px;border-radius:5px;font-size:12.5px;color:#a8d8ea}
    .md pre{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:12px 0;overflow-x:auto}
    .md pre code{background:none;border:none;padding:0;font-size:13px;color:var(--text);white-space:pre}
    .md blockquote{border-left:3px solid var(--accent2);margin:10px 0;padding:8px 14px;color:var(--td);background:rgba(159,122,234,.06);border-radius:0 8px 8px 0}
    .md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .md th{background:rgba(99,179,237,.08);color:var(--accent);font-weight:600;padding:8px 12px;border:1px solid var(--border);text-align:left}
    .md td{padding:7px 12px;border:1px solid var(--border);color:var(--td)}
    .md a{color:var(--accent);text-decoration:none;border-bottom:1px dotted rgba(99,179,237,.4)}
    .step-indicator{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(159,122,234,.06);border:1px solid rgba(159,122,234,.12);border-radius:8px;font-size:12px;color:var(--td);animation:fadeIn .2s ease}
    .step-spinner{width:12px;height:12px;border:2px solid rgba(159,122,234,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    .typing-dots{display:flex;gap:5px;padding:4px 0}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s}
    .typing-dots span:nth-child(3){animation-delay:.4s}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--td);animation:fadeIn .5s ease}
    .empty-icon{font-size:56px;margin-bottom:20px;filter:drop-shadow(0 0 30px rgba(99,179,237,.4))}
    .empty-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
    .empty-sub{font-size:14px;max-width:400px;line-height:1.6}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;justify-content:center}
    .suggestion-btn{background:var(--surface);border:1px solid var(--border);color:var(--td);font-size:12.5px;cursor:pointer;border-radius:20px;padding:7px 14px;font-family:inherit;transition:all .2s}
    .suggestion-btn:hover{border-color:var(--border-bright);color:var(--accent);background:var(--accent-glow)}
    .input-bar{padding:16px 28px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:rgba(0,0,0,.15)}
    .input-row{display:flex;gap:12px;align-items:flex-end}
    .input-wrap{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;padding:4px 4px 4px 16px;transition:border-color .2s,box-shadow .2s}
    .input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:inherit;resize:none;line-height:1.6;padding:8px 0;max-height:140px;overflow-y:auto}
    textarea::placeholder{color:var(--tdm)}
    .send-btn{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0}
    .send-btn:hover{opacity:.85;transform:scale(1.05)}
    .send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .input-hint{font-size:11px;color:var(--tdm);padding:0 4px}
    .error-msg{color:var(--error);font-size:13px;padding:8px 12px;background:rgba(252,129,129,.08);border:1px solid rgba(252,129,129,.2);border-radius:8px}
    .no-papers{padding:32px 20px;text-align:center;color:var(--tdm);font-size:13px}
    .viz-toggle{background:var(--surface);border:1px solid var(--border);color:var(--td);border-radius:8px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
    .viz-toggle:hover,.viz-toggle.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
    .viz-toggle .dot{width:6px;height:6px;border-radius:50%;background:var(--tdm);transition:background .2s}
    .viz-toggle.active .dot{background:var(--success)}
    .viz-drawer{width:360px;min-width:360px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s ease,min-width .3s ease,opacity .3s ease}
    .viz-drawer.hidden{width:0;min-width:0;opacity:0;pointer-events:none}
    .viz-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--td);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-shrink:0}
    .viz-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .viz-scroll::-webkit-scrollbar{width:3px}
    .viz-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .vcard{border:1px solid var(--border);border-radius:10px;animation:fadeIn .25s ease;background:rgba(255,255,255,.02);flex-shrink:0}
    .vcard-head{padding:8px 12px;font-size:11px;font-weight:600;letter-spacing:.4px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
    .vcard-head .step-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
    .vcard-body{padding:10px 12px;font-size:12px;line-height:1.6;max-height:300px;overflow-y:auto}
    .vcard.rewrite .vcard-head{background:rgba(99,179,237,.07);color:var(--accent)}
    .vcard.rewrite .step-num{background:rgba(99,179,237,.15);color:var(--accent)}
    .vcard.retrieve .vcard-head{background:rgba(159,122,234,.07);color:var(--accent2)}
    .vcard.retrieve .step-num{background:rgba(159,122,234,.15);color:var(--accent2)}
    .vcard.rerank .vcard-head{background:rgba(246,173,85,.07);color:var(--warn)}
    .vcard.rerank .step-num{background:rgba(246,173,85,.15);color:var(--warn)}
    .vcard.model .vcard-head{background:rgba(104,211,145,.07);color:var(--success)}
    .vcard.model .step-num{background:rgba(104,211,145,.15);color:var(--success)}
    .score-row{display:flex;align-items:center;gap:8px;margin-top:3px}
    .score-bar-bg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.05)}
    .score-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--warn),var(--success))}
    .score-val{font-size:10px;color:var(--tdm);font-family:'JetBrains Mono',monospace;width:44px;text-align:right}
    .doc-item{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:2px}
    .doc-item:last-child{border-bottom:none}
    .doc-title{font-size:11.5px;font-weight:500;color:var(--text);line-height:1.4}
    .doc-meta{font-size:10px;color:var(--tdm)}
    .doc-excerpt{font-size:11px;color:var(--td);font-style:italic;line-height:1.5;margin-top:2px}
    .rcount-chip{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--td)}
    .rcount-chip strong{color:var(--text)}
    .rtabs{display:flex;gap:4px;margin-bottom:8px}
    .rtab{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;color:var(--tdm)}
    .rtab.active{background:rgba(159,122,234,.12);border-color:rgba(159,122,234,.3);color:var(--accent2)}
    .mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:11px;font-family:inherit}
    .mode-btn{padding:5px 14px;cursor:pointer;border:none;background:transparent;color:var(--tdm);font-family:inherit;font-size:11px;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .mode-btn.active{background:var(--accent-glow);color:var(--accent);font-weight:600}
    .mode-btn.active.kg{background:rgba(183,148,244,.1);color:#b794f4}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse-dot 1.5s infinite;flex-shrink:0}
    .qr-original{color:var(--tdm);font-style:italic;margin-bottom:6px}
    .qr-arrow{color:var(--accent);margin:4px 0;font-size:14px}
    .qr-rewritten{color:var(--text);font-weight:500}
    .rank-num{font-size:10px;font-weight:700;color:var(--warn);width:16px}
    .model-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:8px}
    .model-badge.sonnet{background:rgba(104,211,145,.1);color:var(--success);border:1px solid rgba(104,211,145,.25)}
    .model-badge.haiku{background:rgba(99,179,237,.1);color:var(--accent);border:1px solid rgba(99,179,237,.25)}
    .model-reason{font-size:11px;color:var(--td)}
    .vcard.kg_build .vcard-head{background:rgba(183,148,244,.07);color:#b794f4}
    .vcard.kg_build .step-num{background:rgba(183,148,244,.15);color:#b794f4}
    .vcard.kg_expand .vcard-head{background:rgba(236,201,75,.07);color:#ecc94b}
    .vcard.kg_expand .step-num{background:rgba(236,201,75,.15);color:#ecc94b}
    .mode-btn.active.kg{background:rgba(183,148,244,.1);color:#b794f4}
    .kg-graph-wrap{padding:12px;display:flex;flex-direction:column;gap:8px}
    .kg-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
    .kg-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--td)}
    .kg-stat strong{color:var(--text)}
    .kg-svg-wrap{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative}
    .kg-svg-wrap svg{display:block}
    .kg-legend{display:flex;gap:12px;font-size:10px;color:var(--tdm);margin-top:6px}
    .kg-legend span{display:flex;align-items:center;gap:4px}
    .kg-node-label{font-size:9px;fill:var(--td);pointer-events:none}
    .kg-load-msg{display:flex;align-items:center;justify-content:center;height:160px;font-size:12px;color:var(--tdm)}
    .kg-edge-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
    .kg-edge-item:last-child{border-bottom:none}
    .kg-edge-topics{font-size:10px;color:var(--accent2);margin-top:2px}
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .msg-fade{animation:fadeIn .25s ease}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
marked.use({gfm:true,breaks:true});

const SUGGESTIONS = [
  "What is multi-head attention?","Explain the transformer architecture",
  "How does BERT differ from GPT?","What is chain-of-thought prompting?",
  "Explain LoRA fine-tuning","What are diffusion models?",
];

function generateSessionId(){return 'sess_'+crypto.randomUUID();}

// ── Small components ──────────────────────────────────────────
function PaperItem({paper,selected,onToggle}){
  return(
    <div className={`paper-item ${selected?'selected':''}`} onClick={()=>onToggle(paper.arxiv_id)}>
      {selected&&<span className="check-mark">✓</span>}
      <div className="paper-title">{paper.title}</div>
      <div className="paper-meta">
        {paper.year&&<span className="paper-year">{paper.year}</span>}
        <span className="paper-category">{paper.category||paper.authors}</span>
      </div>
    </div>
  );
}

function MarkdownContent({content}){
  const html=React.useMemo(()=>content?marked.parse(content):'',[content]);
  return <div className="md" dangerouslySetInnerHTML={{__html:html}}/>;
}

function MessageBubble({msg}){
  const [feedback,setFeedback]=React.useState(null);
  const [fbSending,setFbSending]=React.useState(false);
  const sendFeedback=async(score)=>{
    if(!msg.traceId||msg.traceId==='noop'||fbSending)return;
    setFbSending(true);
    try{
      await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({trace_id:msg.traceId,score,comment:score>0?'helpful':'not helpful'})});
      setFeedback(score);
    }catch(e){}
    setFbSending(false);
  };
  return(
    <div className={`message ${msg.role} msg-fade`}>
      <div className="msg-label">{msg.role==='user'?'You':'AI Research Assistant'}</div>
      <div className="bubble">
        {msg.streaming&&!msg.content
          ?<div className="typing-dots"><span/><span/><span/></div>
          :msg.role==='assistant'?<MarkdownContent content={msg.content}/>:msg.content}
      </div>
      {msg.role==='assistant'&&msg.content&&!msg.streaming&&(
        <div className="feedback-row">
          <button className={`fb-btn ${feedback===1?'fb-active-up':''}`} onClick={()=>sendFeedback(1)} disabled={feedback!==null} title="Helpful">👍</button>
          <button className={`fb-btn ${feedback===-1?'fb-active-down':''}`} onClick={()=>sendFeedback(-1)} disabled={feedback!==null} title="Not helpful">👎</button>
          {feedback!==null&&<span className="fb-thanks">Thanks for your feedback!</span>}
        </div>
      )}
    </div>
  );
}

// ── Trace Panel ───────────────────────────────────────────────
function DocList({docs}){
  if(!docs||!docs.length)return <div style={{color:'var(--tdm)',fontSize:11}}>None found</div>;
  return docs.map((d,i)=>(
    <div className="doc-item" key={i}>
      <div className="doc-title">#{i+1} {d.title}</div>
      <div className="doc-meta">{d.authors&&<span>{d.authors.split(',')[0]}{d.authors.includes(',')?' et al.':''}</span>}{d.year&&<span> · {d.year}</span>}</div>
      {d.excerpt&&<div className="doc-excerpt">"{d.excerpt}…"</div>}
    </div>
  ));
}

function CollapsibleCard({stepNum,title,theme,pending,open,onToggle,badge,children}){
  const spinColor=theme==='rewrite'?'var(--accent)':theme==='retrieve'?'var(--accent2)':theme==='rerank'?'var(--warn)':'var(--success)';
  return(
    <div className={`vcard ${theme}`}>
      <div className="vcard-head" onClick={onToggle}>
        <span className="step-num">{stepNum}</span>
        <span style={{flex:1}}>✦ {title}</span>
        {pending&&<div style={{width:12,height:12,borderRadius:'50%',border:`2px solid ${spinColor}33`,borderTopColor:spinColor,animation:'spin .7s linear infinite',flexShrink:0}}/>}
        {!pending&&badge&&<span style={{fontSize:10,opacity:.6}}>{badge}</span>}
        {!pending&&<span style={{fontSize:10,opacity:.5,marginLeft:6}}>{open?'▾':'▸'}</span>}
      </div>
      {open&&children&&<div className="vcard-body">{children}</div>}
    </div>
  );
}

function RewriteBody({data}){
  if(!data)return null;
  return(<>
    <div className="qr-original">"{data.original}"</div>
    <div className="qr-arrow">↓</div>
    <div className="qr-rewritten">"{data.rewritten}"</div>
    {data.temporal&&<div style={{fontSize:10,color:'var(--accent)',marginTop:6}}>⏱ Temporal filter · {data.year_hint}</div>}
  </>);
}

function RetrievalBody({data}){
  const [tab,setTab]=React.useState('fused');
  if(!data)return null;
  const listMap={dense:data.dense_top,bm25:data.bm25_top,fused:data.fused_top};
  return(<>
    <div style={{display:'flex',gap:8,marginBottom:8}}>
      <span className="rcount-chip">Dense <strong>{data.dense_count}</strong></span>
      <span className="rcount-chip">BM25 <strong>{data.bm25_count}</strong></span>
      <span className="rcount-chip">RRF <strong>{data.fused_count}</strong></span>
    </div>
    <div className="rtabs">
      {['dense','bm25','fused'].map(t=>(
        <div key={t} className={`rtab ${tab===t?'active':''}`} onClick={e=>{e.stopPropagation();setTab(t);}}>{t.toUpperCase()}</div>
      ))}
    </div>
    <DocList docs={listMap[tab]}/>
  </>);
}

function RerankBody({data}){
  if(!data)return null;
  const maxScore=Math.max(...data.chunks.map(c=>c.score||0),.01);
  return data.chunks.map((c,i)=>(
    <div className="doc-item" key={i}>
      <div className="doc-title"><span className="rank-num">#{i+1}</span> {c.title}</div>
      <div className="doc-meta">{c.arxiv_id} · {c.year}</div>
      <div className="score-row">
        <div className="score-bar-bg"><div className="score-bar-fill" style={{width:`${Math.min(100,(c.score/maxScore)*100)}%`}}/></div>
        <span className="score-val">{c.score?.toFixed(3)}</span>
      </div>
    </div>
  ));
}

function ModelBody({data}){
  if(!data)return null;
  return(<>
    <div className={`model-badge ${data.model}`}>{data.model==='sonnet'?'🧠':'⚡'} Claude {data.model==='sonnet'?'Sonnet 4.5':'Haiku 4.5'}</div>
    <div className="model-reason">{data.reason}</div>
  </>);
}

function TracePanel({trace,activeStep,visible,mode}){
  const [expanded,setExpanded]=React.useState({});
  const prevStepRef=React.useRef(null);
  const toggle=key=>setExpanded(p=>({...p,[key]:!p[key]}));
  React.useEffect(()=>{
    const keys=['rewrite','retrieval','rerank','model'];
    const latest=[...keys].reverse().find(s=>trace[s]);
    if(latest&&latest!==prevStepRef.current){
      setExpanded(()=>{const n={};keys.forEach(s=>{n[s]=s===latest;});return n;});
      prevStepRef.current=latest;
    }
  },[trace]);
  const isEmpty=!trace.rewrite&&!activeStep;
  return(
    <div className={`viz-drawer ${visible?'':'hidden'}`}>
      <div className="viz-header">
        {activeStep?<span className="live-dot"/>:<span>🔍</span>}
        Pipeline Trace
        {activeStep&&<span style={{marginLeft:'auto',fontSize:10,color:'var(--success)'}}>LIVE</span>}
      </div>
      <div className="viz-scroll">
        {isEmpty&&<div style={{color:'var(--tdm)',fontSize:12,textAlign:'center',padding:'40px 16px',lineHeight:1.8}}>Send a query to see the pipeline trace here</div>}
        {(trace.rewrite||activeStep==='rewrite')&&(
          <CollapsibleCard stepNum={1} title="Query Rewriting" theme="rewrite"
            pending={activeStep==='rewrite'&&!trace.rewrite}
            open={expanded.rewrite!==false} onToggle={()=>toggle('rewrite')} badge="Haiku">
            <RewriteBody data={trace.rewrite}/>
          </CollapsibleCard>
        )}
        {(trace.retrieval||activeStep==='retrieve')&&(
          <CollapsibleCard stepNum={2} title="Hybrid Retrieval" theme="retrieve"
            pending={activeStep==='retrieve'&&!trace.retrieval}
            open={expanded.retrieval!==false} onToggle={()=>toggle('retrieval')}
            badge={trace.retrieval?`${trace.retrieval.dense_count}+${trace.retrieval.bm25_count}→${trace.retrieval.fused_count}`:null}>
            <RetrievalBody data={trace.retrieval}/>
          </CollapsibleCard>
        )}
        {(trace.rerank||activeStep==='rerank')&&(
          <CollapsibleCard stepNum={3} title="Cross-Encoder Re-ranking" theme="rerank"
            pending={activeStep==='rerank'&&!trace.rerank}
            open={expanded.rerank!==false} onToggle={()=>toggle('rerank')}
            badge={trace.rerank?`${trace.rerank.input_count}→${trace.rerank.output_count}`:null}>
            <RerankBody data={trace.rerank}/>
          </CollapsibleCard>
        )}
        {(trace.model||activeStep==='generate')&&(
          <CollapsibleCard stepNum={4} title="Model Selection" theme="model"
            pending={activeStep==='generate'&&!trace.model}
            open={expanded.model!==false} onToggle={()=>toggle('model')}>
            <ModelBody data={trace.model}/>
          </CollapsibleCard>
        )}
      </div>
    </div>
  );
}

// ── Pipeline step labels ──────────────────────────────────────
const STEP_LABELS = {
  rewrite:   'Rewriting query with Haiku…',
  retrieve:  'Hybrid retrieval (Dense + BM25)…',
  rerank:    'Cross-encoder re-ranking…',
  generate:  'Generating answer…',
  kg_build:  'Building knowledge graph…',
  kg_expand: 'Expanding through graph neighbours…',
};

// ── SVG Knowledge Graph ───────────────────────────────────────
function KGGraphPanel({visible, graphData, loading}){
  const svgRef=React.useRef(null);
  if(!visible)return null;
  if(loading) return(
    <div className="kg-graph-wrap">
      <div className="kg-load-msg">⚙️ Building knowledge graph…</div>
    </div>
  );
  if(!graphData||!graphData.nodes||!graphData.nodes.length) return(
    <div className="kg-graph-wrap">
      <div className="kg-load-msg">No graph data. Ask a question in KG mode.</div>
    </div>
  );

  const W=320, H=240;
  const nodes=graphData.nodes.slice(0,40);
  const nodeMap={};
  const angle= nodes.length>1 ? (2*Math.PI/nodes.length) : 0;
  const cx=W/2, cy=H/2, rx=cx-30, ry=cy-30;
  nodes.forEach((n,i)=>{
    const a=i*angle - Math.PI/2;
    nodeMap[n.id]={x:cx+rx*Math.cos(a), y:cy+ry*Math.sin(a), ...n};
  });

  const edges=graphData.edges.filter(e=>nodeMap[e.source]&&nodeMap[e.target]).slice(0,80);
  const maxDeg=Math.max(...nodes.map(n=>n.degree||1),1);

  return(
    <div className="kg-graph-wrap">
      <div className="kg-stats">
        <span className="kg-stat">Papers <strong>{graphData.total_papers}</strong></span>
        <span className="kg-stat">Edges <strong>{graphData.total_edges}</strong></span>
        <span className="kg-stat">Shown <strong>{nodes.length}</strong></span>
      </div>
      <div className="kg-svg-wrap">
        <svg ref={svgRef} width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
          <defs>
            <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#63b3ed" stopOpacity="0.9"/>
              <stop offset="100%" stopColor="#9f7aea" stopOpacity="0.6"/>
            </radialGradient>
            <radialGradient id="seedGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#68d391" stopOpacity="1"/>
              <stop offset="100%" stopColor="#63b3ed" stopOpacity="0.7"/>
            </radialGradient>
          </defs>
          {/* Edges */}
          {edges.map((e,i)=>{
            const s=nodeMap[e.source],t=nodeMap[e.target];
            const opacity=Math.min(0.5, 0.1+(e.weight||1)/15);
            return<line key={i} x1={s.x} y1={s.y} x2={t.x} y2={t.y}
              stroke="rgba(99,179,237,0.3)" strokeWidth={Math.min(2,(e.weight||1)/4+0.3)}
              strokeOpacity={opacity}/>
          })}
          {/* Nodes */}
          {nodes.map((n,i)=>{
            const p=nodeMap[n.id];
            const r=4+Math.min(8,(n.degree||1)/maxDeg*8);
            const isSeed=n.is_seed;
            return<g key={n.id}>
              <title>{n.title}\n{n.year} · {n.category}\nDegree: {n.degree}</title>
              <circle cx={p.x} cy={p.y} r={r+2} fill="transparent"
                stroke={isSeed?"rgba(104,211,145,.5)":"rgba(99,179,237,.2)"}
                strokeWidth={1.5}/>
              <circle cx={p.x} cy={p.y} r={r}
                fill={isSeed?"url(#seedGrad)":"url(#nodeGrad)"}
                opacity={0.7+0.3*(n.degree||1)/maxDeg}
              />
            </g>
          })}
        </svg>
      </div>
      <div className="kg-legend">
        <span><svg width="8" height="8"><circle cx="4" cy="4" r="4" fill="#68d391"/></svg>Seed paper</span>
        <span><svg width="8" height="8"><circle cx="4" cy="4" r="4" fill="#63b3ed"/></svg>Connected</span>
      </div>
      {graphData.edges&&graphData.edges.length>0&&(
        <div style={{marginTop:8}}>
          <div style={{fontSize:10,fontWeight:600,color:'var(--tdm)',letterSpacing:.4,textTransform:'uppercase',marginBottom:4}}>Top Connections</div>
          {graphData.edges.slice(0,4).map((e,i)=>{
            const sn=graphData.nodes.find(n=>n.id===e.source);
            const tn=graphData.nodes.find(n=>n.id===e.target);
            return<div className="kg-edge-item" key={i}>
              <div style={{color:'var(--td)'}}>{sn?.title?.slice(0,30)||e.source}… ↔ {tn?.title?.slice(0,30)||e.target}…</div>
              <div className="kg-edge-topics">{(e.shared_topics||[]).slice(0,5).join(' · ')}</div>
            </div>
          })}
        </div>
      )}
    </div>
  );
}

// ── Trace Panel (unified vector + KG) ────────────────────────
function KGRetrievalBody({data}){
  if(!data)return null;
  return(<>
    <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
      <span className="rcount-chip">Seed <strong>{data.seed_count}</strong></span>
      <span className="rcount-chip">+Expanded <strong>{data.expand_count}</strong></span>
      <span className="rcount-chip">Total <strong>{data.fused_count}</strong></span>
    </div>
    <div style={{fontSize:11,color:'var(--td)',marginBottom:6}}>Graph expanded retrieval — seeds connected by shared topics</div>
    <DocList docs={data.fused_top}/>
  </>);
}
function App(){
  const [papers,setPapers]=useState([]);
  const [papersLoading,setLoading]=useState(true);
  const [filter,setFilter]=useState('');
  const [selectedIds,setSelected]=useState(new Set());
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState('');
  const [isStreaming,setStreaming]=useState(false);
  const [currentStep,setStep]=useState(null);
  const [error,setError]=useState('');
  const [showViz,setShowViz]=useState(false);
  const [trace,setTrace]=useState({});
  const [mode,setMode]=useState('vector');
  const [sessionId]=useState(generateSessionId);
  const [user,setUser]=useState(null);
  const [showApiModal,setShowApiModal]=useState(false);
  const [apiKeyInput,setApiKeyInput]=useState('');
  const [apiKeySaving,setApiKeySaving]=useState(false);
  const [apiKeyError,setApiKeyError]=useState('');
  const [showDropdown,setShowDropdown]=useState(false);
  const [confirmRemove,setConfirmRemove]=useState(false);
  const [removeError,setRemoveError]=useState('');
  const [kgGraph,setKgGraph]=useState(null);
  const [kgLoading,setKgLoading]=useState(false);
  const messagesEndRef=useRef(null);
  const textareaRef=useRef(null);

  // Auth check on mount
  useEffect(()=>{
    fetch('/auth/me').then(async r=>{
      if(r.status===401){window.location.href='/login';return;}
      const data=await r.json();
      setUser(data);
      const dismissed=sessionStorage.getItem('api_key_modal_dismissed');
      if(!data.has_api_key&&!dismissed)setShowApiModal(true);
    }).catch(()=>{window.location.href='/login';});
  },[]);

  // Load papers
  useEffect(()=>{
    fetch('/api/papers').then(r=>r.json())
      .then(d=>{setPapers(d.papers||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  // Load KG graph topology when KG mode is activated
  const loadKgGraph=useCallback(()=>{
    if(kgGraph)return; // already loaded
    setKgLoading(true);
    fetch('/api/kg/graph').then(r=>r.json())
      .then(d=>{setKgGraph(d);setKgLoading(false);})
      .catch(()=>setKgLoading(false));
  },[kgGraph]);

  const switchMode=useCallback((m)=>{
    setMode(m);
    setTrace({});
    if(m==='kg'){
      setShowViz(true);
      loadKgGraph();
    }
  },[loadKgGraph]);

  useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:'smooth'});},[messages,currentStep]);

  const handleInputChange=e=>{
    setInput(e.target.value);
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,140)+'px';
  };

  const filteredPapers=papers.filter(p=>!filter||p.title.toLowerCase().includes(filter.toLowerCase())||(p.authors||'').toLowerCase().includes(filter.toLowerCase()));

  const saveApiKey=async()=>{
    const key=apiKeyInput.trim();
    if(!key.startsWith('sk-ant-')){setApiKeyError('Key must start with sk-ant-');return;}
    setApiKeySaving(true);setApiKeyError('');
    try{
      const r=await fetch('/auth/api-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:key})});
      if(!r.ok)throw new Error('Failed');
      setUser(u=>({...u,has_api_key:true}));
      sessionStorage.setItem('api_key_modal_dismissed','1');
      setShowApiModal(false);setApiKeyInput('');
    }catch(e){setApiKeyError('Failed to save key. Try again.');}
    finally{setApiKeySaving(false);}
  };

  const removeApiKey=async()=>{
    setRemoveError('');
    try{
      const r=await fetch('/auth/api-key',{method:'DELETE'});
      if(!r.ok)throw new Error(`Server error ${r.status}`);
      setUser(u=>({...u,has_api_key:false}));
      sessionStorage.removeItem('api_key_modal_dismissed');
      setConfirmRemove(false);setShowDropdown(false);
      setTimeout(()=>setShowApiModal(true),200);
    }catch(e){setRemoveError('Failed to remove key. Try again.');}
  };

  const sendMessage=useCallback(async question=>{
    if(!question.trim()||isStreaming)return;
    setError('');setTrace({});setStep(null);
    const userMsg={role:'user',content:question};
    setMessages(m=>[...m,userMsg]);
    setInput('');if(textareaRef.current)textareaRef.current.style.height='auto';
    setStreaming(true);
    const aiMsg={role:'assistant',content:'',streaming:true,traceId:'noop'};
    setMessages(m=>[...m,aiMsg]);

    try{
      const res=await fetch('/api/chat',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question,selected_ids:[...selectedIds],history:messages.map(m=>({role:m.role,content:m.content})),session_id:sessionId,mode}),
      });
      if(res.status===402){
        setMessages(m=>m.slice(0,-1));setStreaming(false);
        sessionStorage.removeItem('api_key_modal_dismissed');
        setShowApiModal(true);return;
      }
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const reader=res.body.getReader();const decoder=new TextDecoder();
      let buf='';
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        buf+=decoder.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop()||'';
        for(const line of lines){
          if(!line.startsWith('data:'))continue;
          const json=line.slice(5).trim();if(!json)continue;
          try{
            const evt=JSON.parse(json);
            if(evt.step)setStep(evt.step);
            if(evt.trace)setTrace(t=>({...t,...evt.trace}));
            if(evt.token)setMessages(m=>{const c=[...m];c[c.length-1]={...c[c.length-1],content:c[c.length-1].content+evt.token};return c;});
            if(evt.done){
              setMessages(m=>{const c=[...m];c[c.length-1]={...c[c.length-1],streaming:false,traceId:evt.trace_id};return c;});
              setStreaming(false);setStep(null);
            }
            if(evt.error){setError(evt.error);setMessages(m=>m.slice(0,-1));setStreaming(false);setStep(null);}
          }catch{}
        }
      }
    }catch(e){setError(e.message);setMessages(m=>m.slice(0,-1));setStreaming(false);setStep(null);}
  },[isStreaming,messages,selectedIds,sessionId,mode]);

  const handleKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(input);}};
  const turnCount=messages.filter(m=>m.role==='user').length;

  // Close dropdown on outside click
  useEffect(()=>{
    if(!showDropdown)return;
    const h=e=>{setShowDropdown(false);setConfirmRemove(false);};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[showDropdown]);

  return(
    <div className="layout">
      {/* ── Sidebar ── */}
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="brand">
            <div className="brand-icon">🧠</div>
            <div><div className="brand-name">ArXiv RAG</div><div className="brand-sub">AI Research Assistant</div></div>
          </div>
          <div className="pipeline-pills">
            {mode==='vector'?
              <><span className="pill on">⚡ Dense</span><span className="pill on">📝 BM25</span><span className="pill on">🔀 RRF</span><span className="pill on">🎯 Rerank</span></>
              :<><span className="pill on">⚡ Dense</span><span className="pill on">🕸️ Graph</span><span className="pill on">🎯 Rerank</span><span className="pill off">📝 BM25 ✗</span></>
            }
          </div>
          <div className="search-box">
            <span className="search-icon">🔍</span>
            <input placeholder="Filter papers…" value={filter} onChange={e=>setFilter(e.target.value)}/>
          </div>
        </div>
        <div className="sidebar-count">
          Papers <span className="count-badge">{filteredPapers.length}</span>
        </div>
        <div className="papers-list">
          {papersLoading?<div className="no-papers">Loading…</div>
            :filteredPapers.length===0?<div className="no-papers">No papers indexed yet</div>
            :filteredPapers.map(p=><PaperItem key={p.arxiv_id} paper={p} selected={selectedIds.has(p.arxiv_id)} onToggle={id=>setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;})}/>)}
        </div>
        <div className="sidebar-footer">
          <div className="scope-indicator">
            <div className={`scope-dot ${selectedIds.size===0?'all':''}`}/>
            {selectedIds.size===0?'All papers':'Selected: '+selectedIds.size+' paper'+(selectedIds.size!==1?'s':'')}
            {selectedIds.size>0&&<button className="clear-btn" onClick={()=>setSelected(new Set())}>Clear</button>}
          </div>
          <button className="new-chat-btn" onClick={()=>setMessages([])}>+ New conversation</button>
        </div>
      </div>

      {/* ── Chat Panel ── */}
      <div className="chat-panel">
        <div className="chat-header">
          <div className="chat-icon">💬</div>
          <div>
            <div className="chat-title">Research Chat</div>
            <div className="chat-sub">{mode==='kg'?'Knowledge Graph RAG · Dense Seed + Graph Expansion + Reranking':'Hybrid RAG · Dense + BM25 + RRF + Cross-encoder'}</div>
          </div>
          <div className="header-right">
            {turnCount>0&&<span className="turn-badge">{turnCount} turn{turnCount>1?'s':''}</span>}
            <a href="/learn.html" className="learn-btn">📚 Learn Hub</a>
            <div className="mode-toggle">
              <button className={`mode-btn ${mode==='vector'?'active':''}`} onClick={()=>switchMode('vector')}>⚡ Vector</button>
              <button className={`mode-btn ${mode==='kg'?'active kg':''}`} onClick={()=>switchMode('kg')}>🕸️ Graph</button>
            </div>
            <button className={`viz-toggle ${showViz?'active':''}`} onClick={()=>setShowViz(v=>!v)}><span className="dot"/>Pipeline</button>
            {user&&(
              <div className="user-area" onClick={e=>{e.stopPropagation();setShowDropdown(v=>{if(v)setConfirmRemove(false);return !v;});}}>
                {user.picture?<img className="user-avatar" src={user.picture} alt={user.name}/>:<div className="user-avatar" style={{background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👤</div>}
                <span className="user-name">{user.name?.split(' ')[0]}</span>
                <div className={`user-key-dot ${user.has_api_key?'has-key':''}`} title={user.has_api_key?'API key active':'No API key'}/>
                {showDropdown&&(
                  <div className="user-dropdown" onClick={e=>e.stopPropagation()}>
                    <div style={{padding:'8px 12px 4px',fontSize:11,color:'var(--tdm)'}}>{user.email}</div>
                    <div className="dropdown-divider"/>
                    <div className="dropdown-item" onClick={()=>{setShowDropdown(false);setShowApiModal(true);}}>🔑 {user.has_api_key?'Update API Key':'Add API Key'}</div>
                    {!confirmRemove?(
                      <div className={`dropdown-item ${user.has_api_key?'danger':''}`}
                        onClick={user.has_api_key?()=>{setConfirmRemove(true);setRemoveError('');}:undefined}
                        style={!user.has_api_key?{opacity:.4,cursor:'default'}:{}}>
                        🗑 Remove API Key{!user.has_api_key&&<span style={{fontSize:10,opacity:.6}}> — none stored</span>}
                      </div>
                    ):(
                      <div style={{padding:'8px 12px'}}>
                        <div style={{fontSize:11.5,color:'var(--error)',marginBottom:8}}>Remove key from DB?</div>
                        {removeError&&<div style={{fontSize:11,color:'var(--error)',marginBottom:6}}>{removeError}</div>}
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={removeApiKey} style={{flex:1,padding:'5px 0',borderRadius:7,border:'1px solid var(--error)',background:'rgba(252,129,129,.12)',color:'var(--error)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Yes, remove</button>
                          <button onClick={()=>{setConfirmRemove(false);setRemoveError('');}} style={{flex:1,padding:'5px 0',borderRadius:7,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--td)',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
                        </div>
                      </div>
                    )}
                    <div className="dropdown-divider"/>
                    <div className="dropdown-item danger" onClick={()=>window.location.href='/auth/logout'}>⎋ Sign out</div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Messages */}
        <div className="chat-messages">
          {messages.length===0&&!isStreaming?(
            <div className="empty-state">
              <div className="empty-icon">🔭</div>
              <div className="empty-title">What do you want to explore?</div>
              <div className="empty-sub">Ask anything about the indexed research papers. I use hybrid retrieval + reranking for accurate answers.</div>
              <div className="suggestions">
                {SUGGESTIONS.map(s=><button key={s} className="suggestion-btn" onClick={()=>sendMessage(s)}>{s}</button>)}
              </div>
            </div>
          ):(
            messages.map((msg,i)=><MessageBubble key={i} msg={msg}/>)
          )}
          {currentStep&&<div className="step-indicator msg-fade"><div className="step-spinner"/><span>{STEP_LABELS[currentStep]||currentStep+'…'}</span></div>}
          {error&&<div className="error-msg">⚠️ {error}</div>}
          <div ref={messagesEndRef}/>
        </div>

        {/* Input bar */}
        <div className="input-bar">
          <div className="input-row">
            <div className="input-wrap">
              <textarea ref={textareaRef} placeholder="Ask a question about the research papers… (Enter to send)" value={input} onChange={handleInputChange} onKeyDown={handleKey} disabled={isStreaming} rows={1}/>
              <button className="send-btn" onClick={()=>sendMessage(input)} disabled={isStreaming||!input.trim()}>➤</button>
            </div>
          </div>
          <div className="input-hint">
            {selectedIds.size>0?`🎯 Searching ${selectedIds.size} selected paper${selectedIds.size!==1?'s':''}`:turnCount>0?`💬 ${turnCount} turn conversation`:'📚 Searching all '+papers.length+' papers'}
          </div>
        </div>
      </div>

      {/* ── Trace Drawer ── */}
      <div className={`viz-drawer ${showViz?'':'hidden'}`}>
        <div className="viz-header">
          {currentStep?<span className="live-dot"/>:<span>{mode==='kg'?'🕸️':'🔍'}</span>}
          {mode==='kg'?'Knowledge Graph':'Pipeline Trace'}
          {currentStep&&<span style={{marginLeft:'auto',fontSize:10,color:'var(--success)'}}>LIVE</span>}
        </div>
        <div className="viz-scroll">
          {mode==='kg'&&(
            <KGGraphPanel
              visible={mode==='kg'}
              graphData={trace.retrieval?.graph_nodes?{
                nodes:trace.retrieval.graph_nodes,
                edges:trace.retrieval.graph_edges,
                total_papers:kgGraph?.total_papers||trace.retrieval.graph_nodes.length,
                total_edges:kgGraph?.total_edges||trace.retrieval.graph_edges?.length||0,
              }:kgGraph}
              loading={kgLoading&&!kgGraph}
            />
          )}
          {/* ── Vector or KG trace steps ── */}
          {(!trace.rewrite&&!currentStep)&&mode==='vector'&&<div style={{color:'var(--tdm)',fontSize:12,textAlign:'center',padding:'40px 16px',lineHeight:1.8}}>Send a query to see the pipeline trace here</div>}
          {(trace.rewrite||currentStep==='rewrite')&&(
            <CollapsibleCard stepNum={1} title="Query Rewriting" theme="rewrite"
              pending={currentStep==='rewrite'&&!trace.rewrite}
              open={true} onToggle={()=>{}} badge="Haiku">
              <RewriteBody data={trace.rewrite}/>
            </CollapsibleCard>
          )}
          {mode==='kg'?(
            <>
              {(trace.retrieval||currentStep==='kg_build'||currentStep==='kg_expand')&&(
                <CollapsibleCard stepNum={2} title="Graph Seed (Dense)" theme="kg_build"
                  pending={(currentStep==='kg_build')&&!trace.retrieval}
                  open={true} onToggle={()=>{}}
                  badge={trace.retrieval?`seed:${trace.retrieval.seed_count}`:null}>
                  <DocList docs={trace.retrieval?.dense_top}/>
                </CollapsibleCard>
              )}
              {(trace.retrieval?.expand_count>0||currentStep==='kg_expand')&&(
                <CollapsibleCard stepNum={3} title="Graph Expansion" theme="kg_expand"
                  pending={currentStep==='kg_expand'&&!trace.retrieval?.expand_count}
                  open={true} onToggle={()=>{}}
                  badge={trace.retrieval?`+${trace.retrieval.expand_count} papers`:null}>
                  <KGRetrievalBody data={trace.retrieval}/>
                </CollapsibleCard>
              )}
            </>
          ):(
            <>
              {(trace.retrieval||currentStep==='retrieve')&&(
                <CollapsibleCard stepNum={2} title="Hybrid Retrieval" theme="retrieve"
                  pending={currentStep==='retrieve'&&!trace.retrieval}
                  open={true} onToggle={()=>{}}
                  badge={trace.retrieval?`${trace.retrieval.dense_count}+${trace.retrieval.bm25_count}→${trace.retrieval.fused_count}`:null}>
                  <RetrievalBody data={trace.retrieval}/>
                </CollapsibleCard>
              )}
            </>
          )}
          {(trace.rerank||currentStep==='rerank')&&(
            <CollapsibleCard stepNum={mode==='kg'?4:3} title="Cross-Encoder Re-ranking" theme="rerank"
              pending={currentStep==='rerank'&&!trace.rerank}
              open={true} onToggle={()=>{}}
              badge={trace.rerank?`${trace.rerank.input_count}→${trace.rerank.output_count}`:null}>
              <RerankBody data={trace.rerank}/>
            </CollapsibleCard>
          )}
          {(trace.model||currentStep==='generate')&&(
            <CollapsibleCard stepNum={mode==='kg'?5:4} title="Model Selection" theme="model"
              pending={currentStep==='generate'&&!trace.model}
              open={true} onToggle={()=>{}}>
              <ModelBody data={trace.model}/>
            </CollapsibleCard>
          )}
        </div>
      </div>

      {/* ── API Key Modal ── */}
      {showApiModal&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget){sessionStorage.setItem('api_key_modal_dismissed','1');setShowApiModal(false);}}}>
          <div className="modal-box">
            <div className="modal-title">🔑 Add your Anthropic API Key</div>
            <div className="modal-sub">Your key is stored encrypted and used only for your chat queries.{user&&!user.has_api_key?' You need this to use the chatbot.':''}</div>
            <input className="modal-input" type="password" placeholder="sk-ant-api03-…" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveApiKey()} autoFocus/>
            <div className="modal-hint">Get your key at <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a>. Keys start with <code>sk-ant-</code>.</div>
            {apiKeyError&&<div style={{color:'var(--error)',fontSize:12,marginBottom:10}}>{apiKeyError}</div>}
            <div className="modal-actions">
              <button className="modal-btn primary" onClick={saveApiKey} disabled={apiKeySaving}>{apiKeySaving?'Saving…':'Save Key'}</button>
              <button className="modal-btn secondary" onClick={()=>{sessionStorage.setItem('api_key_modal_dismissed','1');setShowApiModal(false);}}>Skip for now</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
